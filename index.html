<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#e63946"/>
<title>পুলিশ অ্যালার্ট 🚨</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif;background:#1a1a1a}

/* ---- MAP ---- */
#map{position:fixed;inset:0;z-index:1}

/* ---- TOP BAR ---- */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(255,255,255,0.97);
  backdrop-filter:blur(8px);
  padding:8px 10px;
  display:flex;gap:8px;align-items:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.15);
}
#topbar .logo{font-size:22px;flex-shrink:0}
#searchWrap{flex:1;position:relative}
#searchBox{
  width:100%;padding:8px 12px;
  border:1.5px solid #ddd;border-radius:20px;
  font-size:14px;outline:none;background:#f8f8f8;
  font-family:inherit;
}
#searchBox:focus{border-color:#e63946;background:#fff}
#searchDrop{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:#fff;border:1px solid #ddd;border-radius:10px;
  overflow:hidden;display:none;z-index:200;
  box-shadow:0 4px 16px rgba(0,0,0,0.12);
}
.sitem{padding:10px 14px;font-size:13px;cursor:pointer;color:#333;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:8px}
.sitem:last-child{border-bottom:none}
.sitem:hover{background:#f8f8f8}
#locBtn{
  width:38px;height:38px;border-radius:50%;border:1.5px solid #ddd;
  background:#fff;font-size:18px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
#locBtn:hover{background:#f0f0f0}

/* ---- STATS BAR ---- */
#statsbar{
  position:fixed;top:58px;left:50%;transform:translateX(-50%);z-index:100;
  background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);
  border-radius:20px;padding:5px 14px;
  display:flex;gap:12px;align-items:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.12);
  font-size:12px;white-space:nowrap;
}
.sstat{display:flex;align-items:center;gap:4px;font-weight:600}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ---- BOTTOM BAR ---- */
#bottombar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  padding:10px 14px;
  display:flex;gap:10px;
  background:rgba(255,255,255,0.97);backdrop-filter:blur(8px);
  box-shadow:0 -2px 8px rgba(0,0,0,0.1);
}
#addBtn{
  flex:1;height:46px;background:#e63946;color:#fff;border:none;
  border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 3px 10px rgba(230,57,70,0.4);transition:background .2s;
}
#addBtn:hover{background:#c1121f}
#addBtn.cancel-mode{background:#555;box-shadow:none}
#listBtn{
  width:46px;height:46px;border-radius:12px;border:1.5px solid #ddd;
  background:#fff;font-size:20px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
#listBtn:hover{background:#f5f5f5}

/* ---- ADDING HINT ---- */
#addHint{
  position:fixed;top:58px;left:50%;transform:translateX(-50%);z-index:200;
  background:#e63946;color:#fff;padding:10px 20px;border-radius:999px;
  font-size:14px;font-weight:600;display:none;align-items:center;gap:10px;
  white-space:nowrap;box-shadow:0 4px 16px rgba(230,57,70,0.4);
  animation:slideDown .25s ease;
}
@keyframes slideDown{from{transform:translateX(-50%) translateY(-10px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
#addHint button{background:rgba(255,255,255,0.25);border:none;color:#fff;padding:4px 12px;border-radius:999px;font-size:13px;cursor:pointer;font-family:inherit}

/* ---- MODAL ---- */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
.modal{
  background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;
  padding:20px 20px 30px;max-height:90vh;overflow-y:auto;
  animation:up .25s ease;
}
@keyframes up{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.modal h3 button{background:none;border:none;font-size:20px;color:#999;cursor:pointer;line-height:1}
.flabel{font-size:12px;font-weight:700;color:#666;margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.3px}
.fgroup{margin-bottom:14px}
.typegrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.typebtn{
  padding:12px 8px;border:2px solid #e0e0e0;border-radius:10px;
  background:#fff;cursor:pointer;font-size:13px;font-weight:600;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  transition:all .15s;color:#555;
}
.typebtn span.ic{font-size:22px}
.typebtn.active[data-t="Police"]{border-color:#e63946;background:#fff0f1;color:#e63946}
.typebtn.active[data-t="Checkpost"]{border-color:#2196f3;background:#e3f2fd;color:#2196f3}
.typebtn.active[data-t="DB"]{border-color:#4caf50;background:#e8f5e9;color:#4caf50}
.typebtn.active[data-t="Traffic"]{border-color:#ff9800;background:#fff3e0;color:#ff9800}
.finput{
  width:100%;padding:10px 14px;border:1.5px solid #e0e0e0;border-radius:10px;
  font-size:14px;outline:none;font-family:inherit;color:#1a1a1a;
}
.finput:focus{border-color:#e63946}
.coords-info{font-size:12px;color:#999;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.savebtn{
  width:100%;padding:14px;background:#e63946;color:#fff;border:none;
  border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 3px 10px rgba(230,57,70,0.35);transition:background .2s;
  font-family:inherit;
}
.savebtn:hover{background:#c1121f}
.savebtn:disabled{opacity:.5;cursor:not-allowed}

/* ---- LIST PANEL ---- */
#listPanel{
  position:fixed;bottom:0;left:0;right:0;z-index:400;
  background:#fff;border-radius:20px 20px 0 0;
  max-height:80vh;display:flex;flex-direction:column;
  box-shadow:0 -4px 20px rgba(0,0,0,0.15);
  transform:translateY(100%);transition:transform .3s ease;
}
#listPanel.open{transform:translateY(0)}
.panel-head{padding:14px 16px 10px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.panel-head h3{font-size:15px;font-weight:700}
.panel-head button{background:none;border:none;font-size:20px;color:#999;cursor:pointer}
.panel-search{padding:8px 16px;flex-shrink:0}
.panel-search input{width:100%;padding:8px 14px;border:1.5px solid #e0e0e0;border-radius:999px;font-size:13px;outline:none;font-family:inherit}
.panel-search input:focus{border-color:#e63946}
#listBody{overflow-y:auto;padding:8px 12px 20px}
.litem{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:10px;margin-bottom:6px;cursor:pointer;
  border:1px solid #f0f0f0;transition:background .15s;
}
.litem:hover{background:#f8f8f8}
.lbadge{padding:3px 8px;border-radius:999px;font-size:11px;font-weight:700;flex-shrink:0}
.linfo{flex:1;min-width:0}
.lname{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ltime{font-size:11px;color:#999;margin-top:2px}
.lvotes{font-size:11px;color:#aaa;flex-shrink:0}
.lempty{text-align:center;padding:40px 20px;color:#bbb;font-size:14px}

/* ---- POPUP ---- */
.leaflet-popup-content-wrapper{border-radius:14px!important;box-shadow:0 4px 20px rgba(0,0,0,0.15)!important;padding:0!important;overflow:hidden;border:none!important}
.leaflet-popup-content{margin:0!important}
.leaflet-popup-tip-container{display:none}
.leaflet-popup-close-button{top:8px!important;right:8px!important;font-size:18px!important;color:#999!important}
.pcard{font-family:'Segoe UI',Arial,sans-serif;min-width:220px;max-width:280px}
.ptop{padding:14px 14px 10px}
.pbadge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;margin-bottom:8px}
.ptitle{font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:3px}
.pdesc{font-size:12px;color:#555;line-height:1.5;margin-bottom:4px}
.ptime{font-size:11px;color:#aaa}
.pvotes{padding:10px 14px;border-top:1px solid #f0f0f0;display:flex;gap:8px}
.vbtn{
  flex:1;padding:7px 4px;border-radius:8px;font-size:12px;font-weight:700;
  border:1.5px solid;cursor:pointer;background:#fff;
  display:flex;align-items:center;justify-content:center;gap:4px;
  transition:background .15s;font-family:inherit;
}
.vbtn.c{color:#4caf50;border-color:#4caf50}.vbtn.c:hover{background:#e8f5e9}
.vbtn.w{color:#e63946;border-color:#e63946}.vbtn.w:hover{background:#fff0f1}
.vbtn:disabled{opacity:.35;cursor:not-allowed}
.pdel{width:100%;padding:7px;font-size:11px;color:#bbb;border:none;background:none;cursor:pointer;border-top:1px solid #f0f0f0}
.pdel:hover{color:#e63946}

/* ---- CUSTOM MARKER ---- */
.mpin{display:flex;flex-direction:column;align-items:center}
.mbody{
  width:36px;height:36px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
  display:flex;align-items:center;justify-content:center;
  border:2.5px solid rgba(255,255,255,0.9);box-shadow:0 3px 8px rgba(0,0,0,0.25);
}
.mbody span{transform:rotate(45deg);font-size:16px;line-height:1}
.msh{width:10px;height:5px;background:rgba(0,0,0,0.15);border-radius:50%;margin-top:2px;filter:blur(2px)}

/* ---- USER DOT ---- */
.udot{width:16px;height:16px;background:#2196f3;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 4px rgba(33,150,243,.25);animation:up2 2s infinite}
@keyframes up2{0%,100%{box-shadow:0 0 0 4px rgba(33,150,243,.25)}50%{box-shadow:0 0 0 8px rgba(33,150,243,.1)}}

/* ---- TOAST ---- */
#toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);
  background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:999px;
  font-size:13px;z-index:999;opacity:0;transition:all .25s;pointer-events:none;
  white-space:nowrap;max-width:90vw;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{background:#4caf50}
#toast.err{background:#e63946}

/* ---- CONFIRM ---- */
#confirmOv{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:800;display:none;align-items:center;justify-content:center;padding:20px}
#confirmOv.open{display:flex}
.cbox{background:#fff;border-radius:16px;padding:24px 20px;max-width:300px;width:100%;text-align:center}
.cbox h4{font-size:16px;font-weight:700;margin-bottom:8px}
.cbox p{font-size:13px;color:#666;line-height:1.6;margin-bottom:16px}
.cbtns{display:flex;gap:8px}
.cno{flex:1;padding:10px;border:1.5px solid #ddd;border-radius:10px;background:#fff;font-size:14px;cursor:pointer;font-family:inherit}
.cyes{flex:2;padding:10px;background:#e63946;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}

/* ---- SAFE AREA ---- */
@supports(padding:env(safe-area-inset-bottom)){
  #bottombar{padding-bottom:calc(10px + env(safe-area-inset-bottom))}
}

/* Leaflet zoom hide (custom buttons) */
.leaflet-control-zoom{display:none}
.leaflet-control-attribution{font-size:9px!important}
</style>
</head>
<body>

<!-- MAP -->
<div id="map"></div>

<!-- TOP BAR -->
<div id="topbar">
  <div class="logo">🚨</div>
  <div id="searchWrap">
    <input id="searchBox" type="text" placeholder="এলাকা বা স্থান খুঁজুন..." autocomplete="off"/>
    <div id="searchDrop"></div>
  </div>
  <button id="locBtn" title="আমার অবস্থান">📍</button>
</div>

<!-- STATS -->
<div id="statsbar">
  <div class="sstat"><div class="sdot" style="background:#e63946"></div><span id="sc0">০</span> পুলিশ</div>
  <div class="sstat"><div class="sdot" style="background:#2196f3"></div><span id="sc1">০</span> চেকপোস্ট</div>
  <div class="sstat"><div class="sdot" style="background:#4caf50"></div><span id="sc2">০</span> ডিবি</div>
  <div class="sstat"><div class="sdot" style="background:#ff9800"></div><span id="sc3">০</span> ট্রাফিক</div>
</div>

<!-- ADDING HINT -->
<div id="addHint">
  <span>📍 ম্যাপে ট্যাপ করুন</span>
  <button id="cancelAddBtn">বাতিল</button>
</div>

<!-- BOTTOM BAR -->
<div id="bottombar">
  <button id="addBtn">
    <span style="font-size:20px">+</span> লোকেশন যোগ করুন
  </button>
  <button id="listBtn">☰</button>
</div>

<!-- ADD MODAL -->
<div class="overlay" id="addOv">
  <div class="modal">
    <h3>নতুন সতর্কতা <button id="closeAdd">✕</button></h3>
    <div class="fgroup">
      <label class="flabel">ধরন বেছে নিন</label>
      <div class="typegrid">
        <button class="typebtn active" data-t="Police"><span class="ic">👮</span>পুলিশ সার্জেন্ট</button>
        <button class="typebtn" data-t="Checkpost"><span class="ic">🚧</span>চেকপোস্ট</button>
        <button class="typebtn" data-t="DB"><span class="ic">🕵️</span>ডিবি পুলিশ</button>
        <button class="typebtn" data-t="Traffic"><span class="ic">🚦</span>ট্রাফিক পুলিশ</button>
      </div>
    </div>
    <div class="fgroup">
      <label class="flabel">লোকেশনের নাম <small style="font-weight:400;text-transform:none">(ঐচ্ছিক)</small></label>
      <input class="finput" id="locName" type="text" placeholder="যেমন: মিরপুর ১০ গোল চত্বর"/>
    </div>
    <div class="fgroup">
      <label class="flabel">বিবরণ <small style="font-weight:400;text-transform:none">(ঐচ্ছিক)</small></label>
      <input class="finput" id="locDesc" type="text" placeholder="অতিরিক্ত তথ্য..."/>
    </div>
    <div class="coords-info" id="coordsInfo">📍 —</div>
    <button class="savebtn" id="saveBtn">✓ সংরক্ষণ করুন</button>
  </div>
</div>

<!-- LIST PANEL -->
<div id="listPanel">
  <div class="panel-head">
    <h3>সব রিপোর্ট (<span id="listCount">০</span>)</h3>
    <button id="closeList">✕</button>
  </div>
  <div class="panel-search"><input id="listSearch" type="text" placeholder="খুঁজুন..."/></div>
  <div id="listBody"></div>
</div>

<!-- CONFIRM -->
<div id="confirmOv">
  <div class="cbox">
    <h4 id="cTitle">নিশ্চিত করুন</h4>
    <p id="cMsg"></p>
    <div class="cbtns">
      <button class="cno" id="cNo">না</button>
      <button class="cyes" id="cYes">হ্যাঁ, মুছুন</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* =============================================
   POLICE ALERT MAP — SINGLE FILE COMPLETE APP
   ============================================= */

/* ---- FIREBASE CONFIG ---- */
firebase.initializeApp({
  apiKey:            "AIzaSyCVyMiaeBiVhUFyK3Na_YStd4qXYNfKTf4",
  authDomain:        "police-alert-da9f2.firebaseapp.com",
  databaseURL:       "https://police-alert-da9f2-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "police-alert-da9f2",
  storageBucket:     "police-alert-da9f2.firebasestorage.app",
  messagingSenderId: "79476446613",
  appId:             "1:79476446613:web:8ab17a9a2c4488407a929c"
});
const db = firebase.database().ref('markers');

/* ---- CONSTANTS ---- */
const T = {
  Police:    {label:'পুলিশ',    color:'#e63946', bg:'#fff0f1', emoji:'👮'},
  Checkpost: {label:'চেকপোস্ট', color:'#2196f3', bg:'#e3f2fd', emoji:'🚧'},
  DB:        {label:'ডিবি',      color:'#4caf50', bg:'#e8f5e9', emoji:'🕵️'},
  Traffic:   {label:'ট্রাফিক',  color:'#ff9800', bg:'#fff3e0', emoji:'🚦'},
};
const WRONG_LIMIT = 5;
const RATE_KEY    = 'pa_rate';
const VOTED_KEY   = 'pa_voted';

/* ---- STATE ---- */
let map, markers = {}, adding = false, pendingLL = null, selType = 'Police', userMark = null;
let confirmCb = null;

/* ---- UTILS ---- */
function bn(n){return String(Math.round(n)).replace(/[0-9]/g,d=>'০১২৩৪৫৬৭৮৯'[d])}
function ago(ts){
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60)return'এইমাত্র';
  if(s<3600)return bn(Math.floor(s/60))+' মিনিট আগে';
  if(s<86400)return bn(Math.floor(s/3600))+' ঘণ্টা আগে';
  return bn(Math.floor(s/86400))+' দিন আগে';
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

let _tt;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast show'+(type?' '+type:'');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),3000);
}

/* ---- RATE LIMIT ---- */
function canAdd(){
  try{
    const r=JSON.parse(localStorage.getItem(RATE_KEY)||'{"c":0,"t":0}');
    if(Date.now()-r.t>3600000)return true;
    return r.c<10;
  }catch{return true}
}
function bumpRate(){
  try{
    const r=JSON.parse(localStorage.getItem(RATE_KEY)||'{"c":0,"t":0}');
    const now=Date.now();
    if(now-r.t>3600000)localStorage.setItem(RATE_KEY,JSON.stringify({c:1,t:now}));
    else localStorage.setItem(RATE_KEY,JSON.stringify({c:r.c+1,t:r.t}));
  }catch{}
}

/* ---- VOTE TRACKING ---- */
function hasVoted(id){try{return!!JSON.parse(localStorage.getItem(VOTED_KEY)||'{}')[id]}catch{return false}}
function setVoted(id){try{const v=JSON.parse(localStorage.getItem(VOTED_KEY)||'{}');v[id]=1;localStorage.setItem(VOTED_KEY,JSON.stringify(v))}catch{}}

/* ---- MAP INIT ---- */
function initMap(){
  map = L.map('map',{center:[23.8103,90.4125],zoom:13,zoomControl:false,preferCanvas:true});

  // Google Maps tiles — fastest in Bangladesh, no key needed
  L.tileLayer('https://mt{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{
    subdomains:['0','1','2','3'],
    attribution:'© Google',
    maxZoom:20,
  }).addTo(map);

  map.on('click', onMapClick);
}

/* ---- MARKER ICON ---- */
function makeIcon(type, faded=false){
  const t=T[type]||T.Police;
  return L.divIcon({
    html:`<div class="mpin" style="opacity:${faded?.3:1}">
      <div class="mbody" style="background:${t.color}"><span>${t.emoji}</span></div>
      <div class="msh"></div>
    </div>`,
    className:'', iconSize:[36,48], iconAnchor:[18,48], popupAnchor:[0,-50]
  });
}

/* ---- POPUP HTML ---- */
function popupHTML(m){
  const t=T[m.type]||T.Police;
  const voted=hasVoted(m.id);
  const faded=(m.wrong||0)>=WRONG_LIMIT;
  return `<div class="pcard">
    <div class="ptop">
      <div class="pbadge" style="background:${t.bg};color:${t.color}">${t.emoji} ${t.label}</div>
      <div class="ptitle">${esc(m.name)||t.label+' সতর্কতা'}</div>
      ${m.desc?`<div class="pdesc">${esc(m.desc)}</div>`:''}
      <div class="ptime">${ago(m.ts)}${faded?' · <span style="color:#e63946">⚠ অধিক ভুল</span>':''}</div>
    </div>
    <div class="pvotes">
      <button class="vbtn c" onclick="vote('${m.id}','confirm')" ${voted?'disabled':''}>👍 নিশ্চিত <b>${m.confirm||0}</b></button>
      <button class="vbtn w" onclick="vote('${m.id}','wrong')" ${voted?'disabled':''}>👎 ভুল <b>${m.wrong||0}</b></button>
    </div>
    ${voted?'<p style="font-size:11px;color:#bbb;text-align:center;padding:4px 0">ইতোমধ্যে ভোট দিয়েছেন</p>':''}
    <button class="pdel" onclick="delMarker('${m.id}')">মার্কার সরিয়ে দিন</button>
  </div>`;
}

/* ---- PUT MARKER ON MAP ---- */
function putMarker(data){
  if(markers[data.id]){
    // update existing
    const e=markers[data.id];
    e.data=data;
    e.lm.setIcon(makeIcon(data.type,(data.wrong||0)>=WRONG_LIMIT));
    if(e.lm.isPopupOpen()) e.lm.setPopupContent(popupHTML(data));
    return;
  }
  const lm=L.marker([data.lat,data.lng],{icon:makeIcon(data.type,(data.wrong||0)>=WRONG_LIMIT)})
    .addTo(map)
    .bindPopup('',{maxWidth:300,minWidth:220});
  lm.on('click',()=>{lm.setPopupContent(popupHTML(data));lm.openPopup()});
  markers[data.id]={data,lm};
  updateStats();
  updateList();
}

function removeMarker(id){
  if(!markers[id])return;
  map.removeLayer(markers[id].lm);
  delete markers[id];
  updateStats();
  updateList();
}

/* ---- STATS ---- */
function updateStats(){
  const all=Object.values(markers).map(e=>e.data);
  const c={Police:0,Checkpost:0,DB:0,Traffic:0};
  all.forEach(m=>{if(c[m.type]!==undefined)c[m.type]++});
  document.getElementById('sc0').textContent=bn(c.Police);
  document.getElementById('sc1').textContent=bn(c.Checkpost);
  document.getElementById('sc2').textContent=bn(c.DB);
  document.getElementById('sc3').textContent=bn(c.Traffic);
}

/* ---- ADD MODE ---- */
function enterAdd(){
  adding=true;
  map.getContainer().style.cursor='crosshair';
  const h=document.getElementById('addHint');
  h.style.display='flex';
  const b=document.getElementById('addBtn');
  b.innerHTML='✕ বাতিল করুন';
  b.classList.add('cancel-mode');
  // Hide statsbar while adding
  document.getElementById('statsbar').style.display='none';
}
function exitAdd(){
  adding=false; pendingLL=null;
  map.getContainer().style.cursor='';
  document.getElementById('addHint').style.display='none';
  const b=document.getElementById('addBtn');
  b.innerHTML='<span style="font-size:20px">+</span> লোকেশন যোগ করুন';
  b.classList.remove('cancel-mode');
  document.getElementById('statsbar').style.display='flex';
}

function onMapClick(e){
  if(!adding)return;
  pendingLL=e.latlng;
  document.getElementById('coordsInfo').textContent='📍 '+e.latlng.lat.toFixed(5)+', '+e.latlng.lng.toFixed(5);
  document.getElementById('locName').value='';
  document.getElementById('locDesc').value='';
  document.getElementById('addOv').classList.add('open');
  // reverse geocode
  fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${e.latlng.lat}&lon=${e.latlng.lng}&accept-language=bn`)
    .then(r=>r.json()).then(d=>{
      if(d&&d.display_name){
        const name=d.display_name.split(',').slice(0,2).join(',').trim();
        document.getElementById('locName').placeholder=name;
      }
    }).catch(()=>{});
}

/* ---- SAVE ---- */
async function saveLocation(){
  if(!pendingLL)return;
  if(!canAdd()){toast('প্রতি ঘণ্টায় সর্বোচ্চ ১০টি রিপোর্ট করা যাবে','err');return}
  const btn=document.getElementById('saveBtn');
  btn.disabled=true; btn.textContent='সংরক্ষণ হচ্ছে...';
  const name=document.getElementById('locName').value.trim()||document.getElementById('locName').placeholder||'';
  const m={
    id:uid(), lat:pendingLL.lat, lng:pendingLL.lng,
    type:selType, name, desc:document.getElementById('locDesc').value.trim(),
    confirm:0, wrong:0, ts:Date.now()
  };
  try{
    await db.child(m.id).set(m);
    bumpRate();
    document.getElementById('addOv').classList.remove('open');
    exitAdd();
    map.panTo([m.lat,m.lng]);
    toast('লোকেশন যোগ হয়েছে! 🎉','ok');
  }catch(err){
    toast('সংরক্ষণ ব্যর্থ: '+err.message,'err');
  }finally{
    btn.disabled=false; btn.textContent='✓ সংরক্ষণ করুন';
  }
}

/* ---- VOTE (global for popup onclick) ---- */
window.vote=async function(id,type){
  if(hasVoted(id)){toast('ইতোমধ্যে ভোট দিয়েছেন');return}
  const e=markers[id]; if(!e)return;
  const patch={[type]:(e.data[type]||0)+1};
  try{
    await db.child(id).update(patch);
    setVoted(id);
    toast(type==='confirm'?'👍 নিশ্চিত করা হয়েছে!':'👎 ভুল রিপোর্ট দেওয়া হয়েছে');
  }catch{toast('ব্যর্থ হয়েছে','err')}
};

/* ---- DELETE (global for popup onclick) ---- */
window.delMarker=function(id){
  showConfirm('মার্কার মুছুন','এই লোকেশনটি মুছে ফেলবেন?',async()=>{
    try{
      await db.child(id).remove();
      map.closePopup();
      toast('মার্কার মুছে ফেলা হয়েছে');
    }catch{toast('মুছতে পারা যায়নি','err')}
  });
};

/* ---- LIST ---- */
function updateList(){
  const q=(document.getElementById('listSearch')?.value||'').toLowerCase();
  const all=Object.values(markers).map(e=>e.data).sort((a,b)=>b.ts-a.ts);
  const items=q?all.filter(m=>(m.name||'').toLowerCase().includes(q)||(T[m.type]?.label||'').includes(q)):all;
  document.getElementById('listCount').textContent=bn(all.length);
  const body=document.getElementById('listBody');
  if(!items.length){body.innerHTML='<div class="lempty">📍 কোনো রিপোর্ট নেই</div>';return}
  body.innerHTML=items.map(m=>{
    const t=T[m.type]||T.Police;
    return `<div class="litem" onclick="gotoMarker('${m.id}')">
      <span class="lbadge" style="background:${t.bg};color:${t.color}">${t.emoji} ${t.label}</span>
      <div class="linfo">
        <div class="lname">${esc(m.name)||t.label+' সতর্কতা'}</div>
        <div class="ltime">${ago(m.ts)}</div>
      </div>
      <div class="lvotes">👍${m.confirm||0} 👎${m.wrong||0}</div>
    </div>`;
  }).join('');
}

window.gotoMarker=function(id){
  const e=markers[id]; if(!e)return;
  document.getElementById('listPanel').classList.remove('open');
  map.setView([e.data.lat,e.data.lng],17);
  setTimeout(()=>{e.lm.setPopupContent(popupHTML(e.data));e.lm.openPopup()},300);
};

/* ---- CONFIRM ---- */
function showConfirm(title,msg,cb){
  document.getElementById('cTitle').textContent=title;
  document.getElementById('cMsg').textContent=msg;
  document.getElementById('confirmOv').classList.add('open');
  confirmCb=cb;
}

/* ---- GPS ---- */
function locateUser(){
  if(!navigator.geolocation){toast('লোকেশন সমর্থিত নয়','err');return}
  toast('অবস্থান খোঁজা হচ্ছে...');
  navigator.geolocation.getCurrentPosition(pos=>{
    const{latitude:lat,longitude:lng}=pos.coords;
    map.setView([lat,lng],16);
    if(userMark)map.removeLayer(userMark);
    userMark=L.marker([lat,lng],{
      icon:L.divIcon({html:'<div class="udot"></div>',className:'',iconSize:[16,16],iconAnchor:[8,8]}),
      zIndexOffset:1000
    }).addTo(map).bindPopup('আপনার অবস্থান').openPopup();
    toast('আপনার অবস্থানে এসেছি ✓','ok');
  },()=>toast('অবস্থান পাওয়া যায়নি','err'),{timeout:10000,enableHighAccuracy:true});
}

/* ---- SEARCH ---- */
let _st;
document.getElementById('searchBox').addEventListener('input',e=>{
  const q=e.target.value.trim();
  const drop=document.getElementById('searchDrop');
  if(!q){drop.style.display='none';return}
  clearTimeout(_st);
  _st=setTimeout(async()=>{
    try{
      const res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&countrycodes=bd&limit=5&accept-language=bn`);
      const data=await res.json();
      if(!data.length){drop.innerHTML='<div class="sitem">কোনো ফলাফল নেই</div>';drop.style.display='block';return}
      drop.innerHTML=data.map(r=>{
        const name=r.display_name.split(',').slice(0,3).join(', ');
        return `<div class="sitem" onclick="goSearch(${r.lat},${r.lon})">📍 ${esc(name)}</div>`;
      }).join('');
      drop.style.display='block';
    }catch{}
  },500);
});
document.getElementById('searchBox').addEventListener('keydown',async e=>{
  if(e.key!=='Enter')return;
  const q=e.target.value.trim(); if(!q)return;
  try{
    const res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&countrycodes=bd&limit=1&accept-language=bn`);
    const data=await res.json();
    if(data[0])goSearch(data[0].lat,data[0].lon);
    else toast('স্থান পাওয়া যায়নি','err');
  }catch{}
});
window.goSearch=function(lat,lng){
  map.setView([parseFloat(lat),parseFloat(lng)],15);
  document.getElementById('searchDrop').style.display='none';
  document.getElementById('searchBox').value='';
  toast('লোকেশনে এসেছি ✓','ok');
};
document.addEventListener('click',e=>{
  if(!e.target.closest('#searchWrap'))
    document.getElementById('searchDrop').style.display='none';
});

/* ---- FIREBASE REALTIME ---- */
db.on('child_added', snap=>{ const m=snap.val(); if(m&&m.id) putMarker(m); });
db.on('child_changed', snap=>{ const m=snap.val(); if(m&&m.id) putMarker(m); });
db.on('child_removed', snap=>{ removeMarker(snap.key); });

/* ---- EVENTS ---- */
document.getElementById('addBtn').addEventListener('click',()=>{
  if(adding)exitAdd(); else enterAdd();
});
document.getElementById('cancelAddBtn').addEventListener('click',exitAdd);
document.getElementById('locBtn').addEventListener('click',locateUser);

document.getElementById('closeAdd').addEventListener('click',()=>{
  document.getElementById('addOv').classList.remove('open');
});
document.getElementById('addOv').addEventListener('click',e=>{
  if(e.target===document.getElementById('addOv'))
    document.getElementById('addOv').classList.remove('open');
});
document.getElementById('saveBtn').addEventListener('click',saveLocation);

// Type selection
document.querySelectorAll('.typebtn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.typebtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    selType=btn.dataset.t;
  });
});

// List panel
document.getElementById('listBtn').addEventListener('click',()=>{
  updateList();
  document.getElementById('listPanel').classList.toggle('open');
});
document.getElementById('closeList').addEventListener('click',()=>{
  document.getElementById('listPanel').classList.remove('open');
});
document.getElementById('listSearch').addEventListener('input',updateList);

// Confirm dialog
document.getElementById('cYes').addEventListener('click',()=>{
  document.getElementById('confirmOv').classList.remove('open');
  if(confirmCb){confirmCb();confirmCb=null;}
});
document.getElementById('cNo').addEventListener('click',()=>{
  document.getElementById('confirmOv').classList.remove('open');
  confirmCb=null;
});

// ESC key
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    exitAdd();
    document.getElementById('addOv').classList.remove('open');
    document.getElementById('listPanel').classList.remove('open');
    document.getElementById('confirmOv').classList.remove('open');
  }
});

/* ---- BOOT ---- */
initMap();

// Auto GPS on load
if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(
    pos=>map.setView([pos.coords.latitude,pos.coords.longitude],14),
    ()=>{}
  );
}
</script>
</body>
</html>
